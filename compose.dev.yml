# 개발용 — bind mount 로 핫리로드, 의존성은 컨테이너의 node_modules 를 유지(named volume).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 최초 부팅 시 'blog' 버킷을 자동 생성하고 CORS 를 개발용 와일드카드로 설정.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc mb local/blog || true) &&
      mc anonymous set download local/blog;
      "
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      # 컨테이너 안에서는 서비스 이름으로 접근.
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/blog
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailpit
      # Windows bind mount 핫리로드 보장 — webpack 폴링 watcher 가 사용.
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    volumes:
      - .:/app
      # node_modules 는 호스트 OS(Windows) 와 분리 — 성능/일관성 위해 named volume.
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started

  # Drizzle Studio (옵션 프로필) — `docker compose -f compose.dev.yml --profile tools up drizzle-studio`
  drizzle-studio:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/blog
    command: ["pnpm", "db:studio"]
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "4983:4983"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
  node_modules:
  next_cache:
