# 프로덕션 시뮬레이션 — bind mount 없음, restart:unless-stopped.
# 학습 포인트:
#  - dev 와는 다른 named volume 이름(pgdata_prod, miniodata_prod) 으로 데이터 분리.
#  - app 컨테이너는 Dockerfile.prod 의 standalone 산출물을 실행.
#  - 마이그레이션은 1회성 'migrate' 서비스가 dev 이미지를 빌려 drizzle-kit 으로 실행.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blog
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata_prod:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc mb local/blog || true) &&
      mc anonymous set download local/blog &&
      mc admin config set local api cors_allow_origin='*' &&
      mc admin service restart local;
      "
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  # 1회성 마이그레이션 — dev 이미지를 빌려 drizzle-kit 실행. app 시작 전 1번.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/blog
    command: ["pnpm", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file: .env
    environment:
      # 컨테이너 네트워크 내부 호스트로 오버라이드 (env_file 의 dev 값을 덮어씀).
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/blog
      S3_ENDPOINT: http://minio:9000
      SMTP_HOST: mailpit
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata_prod:
  miniodata_prod:
